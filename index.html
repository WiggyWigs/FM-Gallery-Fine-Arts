<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Permanent Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --wall: #221d19;
    --wall-deep: #16120f;
    --brass: #c9a54a;
    --brass-dim: #8a6a24;
    --text-on-wall: #e9e2d3;
    --text-muted: #a89a80;
    --plaque-ink: #2c2107;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: radial-gradient(ellipse at top, var(--wall) 0%, var(--wall-deep) 80%);
    color: var(--text-on-wall);
    font-family: 'EB Garamond', serif;
    min-height:100vh;
  }
  header{
    text-align:center;
    padding: 5rem 2rem 3rem;
    border-bottom: 1px solid rgba(201,165,74,0.25);
  }
  header h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    letter-spacing: 0.04em;
    margin:0;
    color: var(--text-on-wall);
  }
  header p{
    font-style: italic;
    color: var(--text-muted);
    font-size: 1.05rem;
    margin: 0.75rem 0 0;
    letter-spacing: 0.02em;
  }
  .gallery{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    grid-auto-rows: 130px;
    grid-auto-flow: dense;
    gap: 56px 48px;
    padding: 5rem 6vw;
    max-width: 1400px;
    margin: 0 auto;
  }
  .piece{
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
    background:none;
    border:none;
    padding:0;
    color:inherit;
    font-family:inherit;
    text-align:center;
  }
  .piece img{
    width:100%;
    height:auto;
    display:block;
    filter: drop-shadow(0 22px 32px rgba(0,0,0,0.55));
    transition: transform 0.25s ease;
  }
  .piece:hover img{ transform: translateY(-4px); }
  .piece.shape-oval img{
    clip-path: ellipse(46% 50% at 50% 50%);
  }
  .size-small  { grid-column: span 2; grid-row: span 2; }
  .size-medium { grid-column: span 3; grid-row: span 3; }
  .size-large  { grid-column: span 4; grid-row: span 4; }

  .plaque{
    margin-top: 18px;
    background: linear-gradient(135deg, var(--brass), var(--brass-dim));
    padding: 8px 22px;
    border-radius: 2px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.4);
  }
  .plaque-title{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size: 0.95rem;
    color: var(--plaque-ink);
    margin:0;
    letter-spacing: 0.02em;
  }
  .plaque-meta{
    font-size: 0.72rem;
    color: var(--text-muted);
    font-style: italic;
    margin: 8px 0 0;
  }

  .overlay{
    position:fixed; inset:0;
    background: rgba(10,8,6,0.88);
    display:none;
    align-items:center;
    justify-content:center;
    padding: 4vw;
    z-index: 50;
  }
  .overlay.open{ display:flex; }
  .overlay-card{
    max-width: 640px;
    text-align:center;
  }
  .overlay-card img{
    max-width: 100%;
    max-height: 55vh;
    filter: drop-shadow(0 30px 50px rgba(0,0,0,0.6));
  }
  .overlay-card.shape-oval img{ clip-path: ellipse(46% 50% at 50% 50%); }
  .overlay-title{
    font-family:'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight:600;
    margin: 1.5rem 0 0.25rem;
  }
  .overlay-meta{
    color: var(--text-muted);
    font-style: italic;
    font-size: 0.9rem;
    margin: 0 0 1.25rem;
  }
  .overlay-wall-text{
    max-width: 460px;
    margin: 0 auto;
    line-height: 1.7;
    color: var(--text-on-wall);
    font-size: 1.02rem;
  }
  .overlay-close{
    margin-top: 2rem;
    background:none;
    border: 1px solid rgba(201,165,74,0.5);
    color: var(--brass);
    font-family: 'EB Garamond', serif;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    padding: 8px 20px;
    border-radius: 2px;
    cursor:pointer;
  }
  .overlay-close:hover{ background: rgba(201,165,74,0.1); }

  @media (max-width: 600px){
    .gallery{ padding: 3rem 6vw; gap: 40px 28px; }
    .size-large{ grid-column: span 2; grid-row: span 3; }
  }
</style>
</head>
<body>

<header>
  <h1>The Permanent Collection</h1>
  <p>Works from the Cul-de-Sac and Backyard Schools, artist unknown</p>
</header>

<main class="gallery" id="gallery" aria-label="Gallery of paintings"></main>

<div class="overlay" id="overlay">
  <div class="overlay-card" id="overlayCard">
    <img id="overlayImg" src="" alt="">
    <p class="overlay-title" id="overlayTitle"></p>
    <p class="overlay-meta" id="overlayMeta"></p>
    <p class="overlay-wall-text" id="overlayWallText"></p>
    <button class="overlay-close" id="overlayClose">Close</button>
  </div>
</div>

<script>
async function loadGallery(){
  const res = await fetch('data/pieces.json');
  const pieces = await res.json();
  const gallery = document.getElementById('gallery');

  pieces.forEach(p => {
    const btn = document.createElement('button');
    btn.className = `piece size-${p.size} shape-${p.shape}`;
    btn.innerHTML = `
      <img src="${p.image}" alt="${p.title}">
      <div class="plaque">
        <p class="plaque-title">${p.title}</p>
        <p class="plaque-meta">${p.inspiration} &middot; ${p.wing}</p>
      </div>
    `;
    btn.addEventListener('click', () => openOverlay(p));
    gallery.appendChild(btn);
  });
}

function openOverlay(p){
  document.getElementById('overlayCard').className = `overlay-card shape-${p.shape}`;
  document.getElementById('overlayImg').src = p.image;
  document.getElementById('overlayImg').alt = p.title;
  document.getElementById('overlayTitle').textContent = p.title;
  document.getElementById('overlayMeta').textContent =
    `${p.inspiration} \u00b7 ${p.wing} \u00b7 ${p.event_date}`;
  document.getElementById('overlayWallText').textContent = p.wall_text;
  document.getElementById('overlay').classList.add('open');
}

document.getElementById('overlayClose').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('open');
});
document.getElementById('overlay').addEventListener('click', (e) => {
  if(e.target.id === 'overlay') e.currentTarget.classList.remove('open');
});

loadGallery();
</script>

</body>
</html>
